<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Compass circle -->
  <circle cx="50" cy="50" r="42" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Cross lines -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Diagonal lines -->
  <line x1="18" y1="18" x2="82" y2="82" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="82" y1="18" x2="18" y2="82" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#1A1A1A"/>
  <!-- North arrow -->
  <polygon points="50,6 44,20 56,20" fill="#1A1A1A"/>
</svg>
