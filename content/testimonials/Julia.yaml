author: Julia
quote: >-
  Wyjazdy z Marią to najlepsza rzecz jaką można dać sobie i dziecku. Wspaniale
  przeplata się czas, kiedy dzieciaki w wolności biegają z radością po dworze,
  tworzą swoje bazy, wymyślają przygody, zawiązują znajomości z czasem dla
  rodzica z dzieckiem, kiedy budujemy głęboką więź poprzez zabawy, śpiewanie,
  grę na instrumentach. Jest też przestrzeń dla dorosłego, który potrzebuje
  złapać oddech od codziennych obowiązków, poczuć, że jest częścią społeczności,
  która też doświadcza trudności w codziennym życiu. Pobyć z innymi dorosłymi,
  czasem śmiejąc się do łez, a czasem wspierając w tym, co trudne.
context: mama 9-letniego Juliana
trip: Rodzinne warsztaty
date: '2026-03-01'
