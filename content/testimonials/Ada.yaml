author: Ada
quote: >-
  Choć Marysię znam nie od dziś to wciąż nie przestaję mnie zaskakiwać. Z
  ogromną przyjemnością i podziwem patrzę na jej drogę, dążenia, upór w
  spełnianiu marzeń i czuję ogromną wdzięczność za to, że z wielką troską,
  delikatnością I uważnością dzieli się swoją wiedzą i doświadczeniem z innymi,
  również ze mną! Ostatnio miałam okazję uczestniczyć w zorganizowanym przez nią
  warsztacie weekendowym "Matka i córka". Możliwość spotkania tylu niesamowitych
  osób, doświadczenie energii, która nie mieści sie w głowie, poczucie
  bezpieczeństwa i dobra, to wszystko dzięki Marysi! Marysiu, działaj dalej, a
  ja mocno zaciskam kciuki za każdy Twój krok.
context: mama 5-letniej Misi
trip: Matka i Córka
date: '2026-02-15'
