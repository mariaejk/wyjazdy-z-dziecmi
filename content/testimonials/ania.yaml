author: Ania
quote: >-
  Wyjazd „Wspólny Rytm" w Kaczem Bagnie był dla nas momentem prawdziwego
  zatrzymania. Moja córka po raz pierwszy poczuła się częścią kręgu kobiet —
  ważna i widziana. Weekend w „bezzasięgowiu", wypełniony tańcem i jogą, dał
  nam bliskość, której nie potrafiłyśmy odnaleźć w codziennym pędzie. To było
  naprawdę lepsze niż niejedna bajka!
context: mama 7-letniej Zuzi
trip: Matka i Córka
