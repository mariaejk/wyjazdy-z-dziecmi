author: Małgorzata
quote: >-
  Swojski klimat, niesamowite jedzenie i poczucie, że jesteśmy w pełni
  zaopiekowani. Maria i współpracujące z nią terapeutki tworzą przestrzeń, w
  której nie trzeba nic udowadniać. Dzieciaki były zachwycone warsztatami
  ceramicznymi i bliskością natury. To miejsce ma duszę, której mogą
  pozazdrościć najdroższe hotele.
context: mama Gai i Leona
