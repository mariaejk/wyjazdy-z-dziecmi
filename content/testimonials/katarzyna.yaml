author: Katarzyna
quote: >-
  Najbardziej bałam się braku zasięgu, a okazał się on największym luksusem.
  Maria wybiera miejsca, które koją samym wyglądem. Joga o poranku, zapach lasu
  w Sasku i wspólne wieczory przy ognisku sprawiły, że pierwszy raz od lat
  naprawdę odpoczęłam, a dzieci ani razu nie zapytały o tablet. Wróciłyśmy z
  nową energią.
context: uczestniczka wyjazdu z jogą i końmi
trip: Yoga i Konie
