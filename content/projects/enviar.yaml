title: Enviar
tagline: 'Firma z przesłaniem '
description: >-
  Czy w świecie biznesu jest miejsce na autentyczne emocje, empatię i
  wdzięczność? Zdecydowanie tak. Enviar to marka, którą stworzyłam, aby wspierać
  firmy w budowaniu silnych, międzyludzkich relacji i autentycznej komunikacji.


  W ramach Enviar zajmujemy się przede wszystkim jakościowym marketingiem,
  budowanie strategii komunikacji, tworzeniem silnych i rozpoznawalnych marek,
  wsparciem w obszarze SoMe, sprzedaży i budowania relacji. 


  Skupiamy się przede wszytkim na organicznym budowaniu zasięgów i pozyskiwaniu
  realnych klientów m.in poprzez social selling czy event marketing.
