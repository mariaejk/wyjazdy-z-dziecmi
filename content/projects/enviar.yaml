title: Enviar
tagline: Firma z przesłaniem — Prezenty i eventy dla Twojego zespołu
description: >-
  Czy w świecie biznesu jest miejsce na autentyczne emocje, empatię i
  wdzięczność? Zdecydowanie tak. Enviar to agencja, którą stworzyłam, aby
  wspierać firmy w budowaniu silnych, międzyludzkich relacji.


  W ramach Enviar łączymy wydarzenia z wyjątkowymi, personalizowanymi prezentami
  dostarczanymi prosto do rąk lub domów pracowników i kontrahentów. Naszą misją
  jest nie tylko przesyłanie pozytywnych emocji, ale również wspieranie kobiecych
  biznesów, promowanie polskich marek oraz dbanie o środowisko.
