title: Enviar - firma z przesłaniem
tagline: 'Firma z przesłaniem '
description: >-
  Czy w świecie biznesu jest miejsce na autentyczne emocje, empatię i
  wdzięczność? Zdecydowanie tak. Enviar- firma z przesłaniem to marka, którą
  stworzyłam, aby wspierać firmy w budowaniu silnych, międzyludzkich relacji i
  autentycznej komunikacji.


  W Enviar zajmujemy się przede wszystkim jakościowym marketingiem, budowaniem
  strategii komunikacji, tworzeniem silnych i rozpoznawalnych marek, wsparciem w
  obszarze SoMe, sprzedaży i budowaniem relacji. 


  Skupiamy się przede wszytkim na organicznym budowaniu zasięgów i pozyskiwaniu
  realnych klientów m.in poprzez social selling czy event marketing.
