title: Joga z Marią
tagline: Twoja chwila oddechu
description: >-
  Joga to dla mnie znacznie więcej niż tylko ruch ciała. To praktyka
  odpuszczania, łapania życiowego balansu i wyciszania przebodźcowanego umysłu,
  co w dzisiejszym szybkim świecie jest nam wszystkim niezwykle potrzebne.


  Prowadzę zajęcia, które pomagają zrzucić z barków codzienne napięcie i dają
  przestrzeń, by po prostu „być" tu i teraz. Niezależnie od tego, czy dopiero
  zaczynasz, czy praktykujesz od dawna, znajdziesz u mnie bezpieczną,
  nieoceniającą przystań.
