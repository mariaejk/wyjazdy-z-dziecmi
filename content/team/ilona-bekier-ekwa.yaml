name: ' Ilona Bekier-Ekwa '
bio: >-
  Choreografka, reżyserka ruchu, twórczyni spektakli, mentorka, performerka oraz
  nauczycielka jogi i medytacji. Finalistka i choreografka programu „You Can
  Dance - Po Prostu Tańcz”. Reżyseruje ruch sceniczny w produkcjach
  telewizyjnych, koncertach i filmach, współpracując m.in. z Netflix.
  Współpracowała z artystkami takimi jak Kayah, Natalia Kukulska, Doda, Edyta
  Górniak, Justyna Steczkowska, Kasia Kowalska i Reni Jusis. 


  Autorka programów artystyczno-rozwojowych Humanifesto, Womanifesto i
  Manifesto, których finałem jest spektakl-rytuał. Od ponad 20 lat prowadzi
  warsztaty, w których ruch staje się narzędziem budowania świadomości ciała,
  autentycznej ekspresji i pracy z emocjami. W swojej pracy łączy choreografię,
  praktyki somatyczne i medytację z edukacją w zakresie dobrostanu i zarządzania
  energią, wykorzystując m.in. aromaterapię oraz naturalne olejki eteryczne.


  Jest także mamą 5-letniej Naomi, z którą wspólnie praktykuje jogę i taniec,
  zapraszając mamy i córki do spotkania we Wspólnym Rytmie - poprzez ruch,
  bliskość i radość bycia razem.
