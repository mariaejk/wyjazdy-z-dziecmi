name: 'Michał '
bio: >-
  Michał – tata Wandy, masażysta, instruktor sportu oraz terapeuta SPA &
  Wellness. Pracuje z ciałem poprzez dotyk, oddech i świadomy ruch, łącząc
  wiedzę z intuicją.


  W swojej pracy łączy głęboką pracę z powięzią z technikami masaży
  orientalnych, ajurwedyjskich i tantrycznych. Prowadzi również warsztaty
  oddechowe i procesowe, inspirowane pracą z podświadomością i procesem
  twórczym.

  Tworzy przestrzeń do regulacji układu nerwowego, uwalniania napięć i powrotu
  do kontaktu ze sobą – zarówno podczas sesji indywidualnych, warsztatów, jak i
  seansów saunowych, które traktuje jako formę świadomej, prowadzonej podróży.

  Energię czerpie z natury – z ruchu, wody i prostoty bycia.
