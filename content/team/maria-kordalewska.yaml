name: Maria Kordalewska
role: 'Twórczyni projektu, nauczycielka jogi, organizatorka eventów'
bio: >-
  Jestem mamą Laury, nauczycielką jogi i wieloletnią organizatorką eventów,
  która od ponad dekady łączy świat profesjonalnej komunikacji z miłością do
  podróży. Posiadam tytuł doktora nauk o mediach (Uniwersytet Warszawski), a
  moje doświadczenie zawodowe obejmuje zarówno pracę akademicką, jak i
  zarządzanie relacjami w dużych agencjach eventowych.


  Projekt „Wyjazdy z Dziećmi" powstał z mojej osobistej potrzeby spędzania z
  córką czasu, który jest naprawdę wartościowy. W świecie pełnym bodźców szukam
  miejsc w „bezinterneciu" i „bezzasięgowie", gdzie pośród ciszy i natury
  możemy zbliżyć się do siebie samych. Zapraszam do współpracy najlepszych
  specjalistów od rozwoju, aby tworzyć spotkania, które – jak mówią uczestnicy
  – są „lepsze niż bajka".
