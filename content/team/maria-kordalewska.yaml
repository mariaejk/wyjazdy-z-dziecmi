name: Maria Kordalewska
role: 'Twórczyni projektu, Nauczycielka Jogi, Organizatorka Eventów'
bio: >-
  Nazywam się Maria Kordalewska. Z wykształcenia jestem doktorem nauk o mediach,
  wykładowca uniwersytecki, specjalistka od komunikacji, wieloletnia
  organizatorka eventów, a z zamiłowania — pilotką wycieczek, joginką i mamą
  Laury.


  Choć kocham podróże, to w dzisiejszym szybkim świecie coraz częściej wracam
  do miejsc, w których czuję absolutny spokój. Pośród ciszy, w
  „bezinterneciu" i w „bezzasięgowie" organizuję warsztaty, które łączą dwa
  najważniejsze światy: głęboką relację z dzieckiem i przestrzeń na oddech dla
  rodzica.


  Wiem, jak trudno w natłoku obowiązków znaleźć moment na beztroską, uważną
  bliskość. Stworzyłam więc miejsce, w którym możecie po prostu pobyć ze sobą,
  bez planowania i pośpiechu, tworząc wspomnienia, które zostaną z Wami na
  całe życie. Doskonale jednak rozumiem, że brak chwili wytchnienia na co dzień
  szybko prowadzi do frustracji i zwykłego, ludzkiego przemęczenia.


  Dlatego zadbałam o idealną równowagę. Kiedy Twoje dziecko uczestniczy w
  fascynujących warsztatach z naszymi specjalistami, Ty masz wyjątkową okazję,
  aby w końcu zadbać o siebie. Możesz wtedy zrelaksować się, napić kawy w
  absolutnym spokoju, wybrać się na spacer, albo po prostu poleżeć w hamaku z
  książką. To Twój czas na regenerację i naładowanie baterii, tak abyś z nową,
  dobrą energią mógł/mogła wrócić do wspólnej zabawy ze swoim dzieckiem.
  Zapraszam na spotkania, które — jak mówią uczestnicy — są „lepsze niż bajka".
