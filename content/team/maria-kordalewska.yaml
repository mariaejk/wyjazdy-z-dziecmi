name: Maria Kordalewska
role: Twórczyni projektu, Nauczycielka Jogi, Organizatorka Eventów
bio: >-
  **Nazywam się Maria Kordalewska.** Z wykształcenia jestem doktorem nauk o
  mediach, wykładowcą uniwersyteckim, specjalistką od komunikacji, wieloletnią
  organizatorką eventów i wyjazdów, pilotką wycieczek, nauczycielką jogi i mamą
  Laury.


  Choć kocham podróże, to w dzisiejszym, szybkim świecie coraz częściej wracam
  do miejsc, w których czuję **absolutny spokój**. Pośród ciszy, w
  „bezinterneciu" i w „bezzasięgowie" organizuję warsztaty, które łączą dwa,
  najważniejsze światy: **głęboką relację z dzieckiem** i **przestrzeń na oddech
  dla rodzica**.


  Wiem, jak trudno w natłoku obowiązków, znaleźć moment na beztroską, uważną
  bliskość. Stworzyłam więc miejsce, w którym możesz po prostu pobyć ze sobą,
  bez planowania i pośpiechu. Pokazać swojemu dziecku lepszą wersję siebie, bez
  presji i bez frustracji, i na nową poczuć radość z bycia rodzicem. 


  Zadbałam o **idealną równowagę**, w której rodzic i dziecko są tak samo ważni.
  Gdzie liczy się prawdziwa obecność i wspólny rozwój. 
shortBio: >-
  Jestem mamą Laury, nauczycielką jogi, pilotką wycieczek i wieloletnią
  organizatorką eventów z tytułem doktora. Od lat łączę świat profesjonalnej
  komunikacji z miłością do natury.


  Projekt „Wyjazdowe warsztaty z Dziećmi" powstał z mojej osobistej potrzeby
  ucieczki od przebodźcowania. Moje autorskie wyjazdy to idealny balans: z
  jednej strony tworzymy przestrzeń na beztroską bliskość i budowanie wspólnych
  wspomnień z dzieckiem, a z drugiej — dajemy Ci święte prawo do odpoczynku.
  Kiedy Twoje dziecko świetnie się bawi na mądrych warsztatach pod okiem naszych
  specjalistów, Ty w końcu masz czas tylko dla siebie. Na ciepłą kawę w ciszy,
  spacer, albo po prostu nicnierobienie — bez cienia poczucia winy.
