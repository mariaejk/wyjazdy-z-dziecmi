name: Kamila Janczurewicz
role: Konsultantka i terapeutka ajurwedyjska
bio: >-
  Kamila – mama Gai i Niny, pasjonatka bliskiego kontaktu z naturą oraz
  holistycznego podejścia do zdrowia i życia. 


  Konsultantka i terapeutka ajurwedyjska, wspierająca przede wszystkim kobiety
  wysoko wrażliwe w procesie odzyskiwania równowagi i wyciszenia układu
  nerwowego. 


  Kocha konie, ciszę lasu i przestrzeń, jaką daje przebywanie na łonie natury.
  Prowadzi również warsztaty w nurcie bliskości dla dzieci i rodziców, oparte na
  ciepłym i intuicyjnym dotyku, wspierając budowanie głębokiej więzi między
  dzieckiem a rodzicem.
