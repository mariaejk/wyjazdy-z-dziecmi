collaborator:
  name: Kamila Janczurewicz
  role: Konsultantka i terapeutka ajurwedyjska
  bio: >-
    Mama Gai i Niny, pasjonatka bliskiego kontaktu z naturą oraz holistycznego
    podejścia do zdrowia i życia. Konsultantka i terapeutka ajurwedyjska,
    wspierająca przede wszystkim kobiety wysoko wrażliwe w procesie odzyskiwania
    równowagi i wyciszenia układu nerwowego.


    Kocha konie, ciszę lasu i przestrzeń, jaką daje przebywanie na łonie
    natury. Prowadzi również warsztaty w nurcie bliskości dla dzieci i rodziców,
    oparte na ciepłym i intuicyjnym dotyku, wspierając budowanie głębokiej
    więzi między dzieckiem a rodzicem.
  image: /images/kamila.jpg
faq:
  - question: Czy potrzebne jest doświadczenie w jeździe konnej?
    answer: >-
      Nie, zupełnie nie! Infrastruktura Saska pozwala na bezpieczny start dla
      początkujących. Doświadczeni instruktorzy zadbają o komfort zarówno
      dzieci, jak i dorosłych, niezależnie od poziomu zaawansowania.
  - question: Dla jakiego wieku dzieci jest ten wyjazd?
    answer: >-
      Zapraszamy rodziny z dziećmi w każdym wieku — atrakcje są dostosowane do
      etapu rozwoju. Zarówno maluchy, jak i starsze dzieci znajdą coś dla
      siebie.
  - question: Czy wyżywienie jest wliczone w cenę?
    answer: >-
      Wyżywienie jest płatne osobno: 140 zł/dzień (dorosły), 70 zł (dzieci do
      10 lat), bezpłatnie (dzieci do 3 lat). Posiłki przygotowywane są z
      lokalnych składników.
  - question: Jak dojechać do Saska?
    answer: >-
      Sasek Mały znajduje się na Mazurach. Szczegółowe wskazówki dojazdu (w tym
      współrzędne GPS) otrzymasz po potwierdzeniu rezerwacji. Dojazd własny.
  - question: Co zabrać ze sobą?
    answer: >-
      Wygodne ubrania na cebulkę (pogoda nad jeziorem bywa zmienna), buty
      terenowe, strój kąpielowy, krem z filtrem i ulubioną przytulankę dziecka.
      Maty do jogi zapewniamy na miejscu.
  - question: Ile kosztuje nocleg?
    answer: >-
      Noclegi od 100 zł/os/noc. Pełny cennik pokoi dostępny na stronie
      sasek.pl/cennik.
