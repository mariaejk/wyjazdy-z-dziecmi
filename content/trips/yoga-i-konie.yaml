title: 'Joga i Konie — Harmonia Natury na Mazurach'
subtitle: 'Rodzinne warsztaty uważności, bliskości i przygody'
date: '2026-06-20'
dateEnd: '2026-06-22'
location: 'Sasek Mały — Mazury'
category: rodzinny
shortDescription: >-
  Zapraszamy Was do miejsca, gdzie czas mierzy się tętnem lasu i spokojnym
  oddechem stada koni. To przestrzeń dla rodzin, które chcą zamienić miejski
  zgiełk na zapach siana, chłód jeziora i autentyczną relację z naturą.
longDescription: >-
  Wyjazd „Joga i Konie" to spotkanie dwóch światów, które uczą nas tego
  samego: jak być w pełni obecnym „tu i teraz". W Sasku, pośród kilkudziesięciu
  koni i mazurskich lasów, stworzymy bezpieczny krąg, w którym każde dziecko i
  każdy rodzic poczuje się ważny i usłyszany.


  Konie są mistrzami uważności. Wyczuwają nasze emocje i uczą nas spokoju,
  cierpliwości oraz łagodności. Joga z kolei pozwala nam wrócić do własnego
  ciała, wyciszyć układ nerwowy i otworzyć się na spotkanie z drugim
  człowiekiem — tym małym i tym dużym.


  Na wyjazd czeka na Was poranna joga na trawie z widokiem na jezioro,
  dostosowana do możliwości dorosłych i dzieci. Poznacie koński język — naukę
  opieki, czyszczenia i rozumienia koni pod okiem doświadczonych instruktorów.
  Profesjonalna infrastruktura Saska pozwala na bezpieczny start dla
  początkujących i piękne trasy leśne dla zaawansowanych.


  Kamila poprowadzi warsztaty z ajurwedyjskimi wskazówkami dotyczącymi
  wyciszenia i regeneracji, nauką kojącego dotyku i wspólnymi rytuałami
  bliskości.


  A po warsztatach? Kąpiele w piaszczystym jeziorze, wspólne ogniska, spływy
  kajakowe Sawicą i wieczorne rozmowy pod gwiazdami. Mazurski chill w
  najlepszym wydaniu.
