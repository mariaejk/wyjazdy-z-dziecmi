title: 'PLEMIĘ RODZICÓW — weekend dla singli z dziećmi'
subtitle: 'Weekend pełen wsparcia, zabawy i nowych relacji'
date: '2026-05-29'
dateEnd: '2026-05-31'
location: 'Kacze Bagno — Miejsce Inicjatyw Pozytywnych'
category: single-parents
shortDescription: >-
  Bycie rodzicem nie jest proste. A bycie rodzicem samotnym czy samodzielnym…
  to jeszcze większe wyzwanie. Jeśli czujesz, że gdzieś po drodze zgubiłeś/aś
  siebie… że dawno nie było przestrzeni tylko dla Ciebie… to jest dobry moment,
  żeby się zatrzymać.
longDescription: >-
  Dzielenie się opieką nad dzieckiem albo bycie w niej nieustannie. Praca, dom,
  praca, dom… To nie tylko logistyka. To często samotność w podejmowaniu
  decyzji, przeciążenie, zmęczenie i potrzeba bliskości. To moment w życiu,
  w którym próbujesz odnaleźć siebie na nowo.


  Masz pełne prawo do odpoczynku, zabawy, do uznania wszelkich emocji tak, jak
  Twoje dziecko. Masz prawo do szczęścia, do kochania i bycia kochanym. Do
  bycia ważnym — nie tylko jako rodzic.


  Ten weekend jest dla Ciebie, jeśli chcesz na chwilę zatrzymać się i
  odetchnąć, zadbać o swoje ciało i emocje, pogłębić relację ze swoim
  dzieckiem, poznać ludzi, którzy naprawdę rozumieją Twoją sytuację, pobyć
  w miejscu, gdzie nie trzeba nic udowadniać. A może… po prostu spotkać kogoś?


  Warsztat 4 żywiołów — to jedno z głównych doświadczeń tego wyjazdu.
  Przechodzimy przez cztery jakości: ziemię (zatrzymanie i ugruntowanie),
  powietrze (oddech i rozluźnienie), ogień (ruch, taniec i ekspresja),
  wodę (emocje i integracja). Każdy żywioł odkrywa inne emocje, zdejmuje
  napięcia i blokady. To czas dla rodzica, aby wsłuchać się w siebie.


  Rodzicielski „speed dating" — bezpieczna przestrzeń do rozmowy o tym, co
  w samotnym rodzicielstwie najtrudniejsze, ale też o tym, co daje siłę.
  Spotkamy się w kręgu kobiet i mężczyzn, aby przywołać najważniejsze tematy.
  Nie zabraknie także praktyki uważności i elementów tantry.


  Sauna, oddech i regeneracja — wspólnie odkryjemy, jak prawidłowo korzystać
  z sauny. Świadomy oddech, rytuał chłodzenia i aromatyczny akcent z olejkami
  eterycznymi.


  Świętujemy Dzień Dziecka — wspólne zabawy, szczudła, konkurencje
  i dużo niespodzianek!


  Podczas całego weekendu Twoje dziecko też będzie miało swój dobry czas:
  warsztaty ceramiczne, zajęcia artystyczne, dużo zabawy na świeżym
  powietrzu, gry terenowe. Sauna i balia też są dla najmłodszych.
  Ty możesz odetchnąć — ono będzie zaopiekowane.


  Nie musisz być „ogarnięty/a". Nie musisz mieć wszystkiego poukładanego.
  Możesz przyjechać dokładnie takim, jakim jesteś. I zobaczyć, co się
  wydarzy. Dołącz do naszego plemienia.
