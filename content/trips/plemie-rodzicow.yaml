collaborator:
  name: Michał Wróblewski
  role: 'Masażysta, instruktor sportu, terapeuta SPA & Wellness'
  bio: >-
    Tata Wandy. Pracuje z ciałem poprzez dotyk, oddech i świadomy ruch.
    Łączy głęboką pracę z powięzią z technikami masaży orientalnych.
    Prowadzi warsztaty oddechowe i seanse saunowe jako formę świadomej
    podróży. Energię czerpie z natury — z ruchu, wody i prostoty bycia.
  image: /images/michal.jpg
faq:
  - question: Czy mogę przyjechać z dzieckiem?
    answer: >-
      Tak! To warsztat stworzony dla rodziców z dziećmi. Podczas bloków
      dla dorosłych dzieci mają własny program — ceramika, zabawy, gry
      terenowe.
  - question: Czy to tylko dla samotnych rodziców?
    answer: >-
      Nie — zapraszamy zarówno samodzielnych, jak i samotnych rodziców.
      Bez względu na to, do której kategorii siebie zaliczasz, znajdziesz
      tu przestrzeń pełną zrozumienia i wsparcia.
  - question: Jak zarezerwować miejsce?
    answer: >-
      Gwarancją miejsca jest wpłata zaliczki 450 zł. Dane do przelewu
      otrzymasz po wypełnieniu formularza zgłoszeniowego.
