practicalInfo:
  accommodation: >-
    Eko-domki (3-4 os. z łazienką), pokoje w budynku głównym (2-3 os.
    z łazienką), duża sala nad pracownią (wieloosobowa), namiot (dostęp
    do łazienek).
  food: >-
    3 posiłki dziennie (śniadanie, obiad, kolacja), świeże ciasto, owoce,
    kawa, herbata i woda dostępne cały czas. Domowe, zdrowe jedzenie
    z ekologicznych produktów, od lokalnych dostawców i z ogrodu
    permakulturowego. Uwzględniamy diety i alergie.
  transport: ''
  childCare: >-
    Warsztaty ceramiczne w profesjonalnej pracowni, zajęcia artystyczne
    i kulinarne, zabawy na świeżym powietrzu, gry terenowe. Sauna i balia
    też są dla najmłodszych.
