title: 'Świąteczna Edycja Festiwalu Rodzinnego „Zlot Kaczek"'
subtitle: 'Mikołajkowy weekend pełen warsztatów, magii i rodzinnego ciepła'
date: '2025-12-05'
dateEnd: '2025-12-07'
location: 'Kacze Bagno — Miejsce Inicjatyw Pozytywnych'
category: rodzinny
shortDescription: >-
  Wyobraźcie sobie wszystko, co najpiękniejsze w Zlocie Kaczek — domowa
  atmosfera, kameralność, wartościowe warsztaty, cudowni ludzie. Całość
  przyprószona śniegiem, z zapachem cynamonu, otulona ciepłem świateł
  choinkowych.
longDescription: >-
  Warsztaty mikołajkowe, teatralne czy ceramiczne to świetna okazja, aby
  spędzić naprawdę wyjątkowo ten świąteczny czas. W niespiesznej atmosferze, w
  bliskości — po prostu pobyć razem.


  Animacje dla najmłodszych zapewnią chwile wytchnienia dla rodziców, którzy w
  tym czasie mogą skorzystać z zajęć im dedykowanych lub zwyczajnie nie robić
  nic. Program, chociaż bardzo bogaty, daje przestrzeń na odpoczynek i
  wytchnienie.


  Posiłki przygotowujemy na bazie naturalnych składników z naszego ogródka, jaj
  od naszych kur, świeżych produktów dostarczanych przez lokalnych wytwórców.
