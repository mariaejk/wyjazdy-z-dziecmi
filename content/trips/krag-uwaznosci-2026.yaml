title: 'W Kręgu Uważności — wyjazd dla rodziców i dzieci'
subtitle: 'Weekend pełen uważności, rozmów i wspólnego bycia'
date: '2026-05-29'
dateEnd: '2026-05-31'
location: 'Kacze Bagno — Miejsce Inicjatyw Pozytywnych'
category: rodzinny
shortDescription: >-
  Z okazji dnia dziecka, matki i ojca spotkamy się w jeden weekend, aby z
  uważnością spojrzeć na każdego i każdą z Was. To czas, by pokazać, jak ważny
  jesteś w swej roli i jak ważne jest, aby zadbać o siebie — tak jak o swoje
  dziecko.
longDescription: >-
  W kręgu spotkasz rodziców — tych, którzy w pojedynkę wychowują dzieci, i
  tych, którzy mają na co dzień wsparcie partnera. Będzie okazja do wymiany
  doświadczeń, szczerej i wspierającej rozmowy oraz nawiązania wartościowych
  znajomości.


  Krąg, w którym każdy jest ważny i wysłuchany, rozmowa i uważność, a także
  dużo pracy twórczej, joga, treningi, sesja oddechowa, sauna, balia, ognisko,
  kajaki i długie rozmowy pod gwiazdami.
