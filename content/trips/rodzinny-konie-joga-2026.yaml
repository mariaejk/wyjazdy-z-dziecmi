practicalInfo:
  accommodation: >-
    Przytulne apartamenty w pensjonacie Sasek Mały — bezpieczny, ogrodzony
    teren z dostępem do jeziora.
  food: >-
    Całodzienne wyżywienie płatne w pensjonacie. Część pokoi ma już śniadanie
    w cenie, można też wziąć opcję bez wyżywienia. Dzieci do 3 lat bezpłatnie.
    Cennik na sasek.pl.
  transport: Dojazd własny. Szczegółowe wskazówki otrzymasz po rezerwacji.
  childCare: >-
    Podczas bloków warsztatowych dla dorosłych, dziećmi opiekują się
    doświadczone animatorki. Program dla dzieci obejmuje zabawy na świeżym
    powietrzu, tworzenie i ruch.
