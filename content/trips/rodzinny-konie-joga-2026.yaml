title: 'Wakacje z końmi i jogą dla rodziców i dzieci'
subtitle: 'Tydzień natury, bliskości i dobrej energii na Mazurach'
date: '2026-08-01'
dateEnd: '2026-08-07'
location: 'Sasek Mały — Mazury'
category: rodzinny
videoUrl: /videos/warsztaty-z-konmi.mp4
shortDescription: >-
  Zapraszamy na wyjątkowy, rodzinny wyjazd pełen natury, bliskości i dobrej
  energii. Spędzimy tydzień w malowniczym Sasku Małym — wśród lasów, nad
  czystym jeziorem, w rytmie natury i w towarzystwie koni.
longDescription: >-
  To przestrzeń, w której można naprawdę zwolnić, odetchnąć i pobyć razem.


  Konie i przygoda: przejażdżki konne w terenie, nauka jazdy z instruktorem,
  codzienna opieka nad końmi (karmienie, czyszczenie), pływanie z końmi
  w jeziorze, joga na polanie wśród koni, odprowadzanie koni na łąki
  i nocny powrót wojskowym autem.


  Joga i uważność: poranna joga nad brzegiem jeziora, fun joga dla rodziców
  i dzieci, relaksacje i świadomy oddech.


  Ajurweda i bliskość: Kamila poprowadzi warsztaty ajurwedyjskie — naturalny
  sposób na regulację układu nerwowego, warsztat świadomego dotyku dla
  rodziców i dzieci. Masaże dla rodziców i dzieci (opcjonalnie, dodatkowo
  płatne).


  Radość bycia razem: codzienne zabawy inspirowane naturą, kąpiele
  w jeziorze, rodzinne ogniska pod gwiazdami.


  Zapewniamy gry i zabawy dla dzieci każdego dnia oraz częściową opiekę dla
  dzieci, podczas gdy dorośli będą na jodze lub na warsztacie im dedykowanym.


  Okolica Saska to prawdziwy raj dla miłośników spacerów i rowerowych wypraw.
  Malownicze trasy prowadzą przez lasy i wzdłuż jezior — a jeśli nie macie
  rowerów, można je wypożyczyć na miejscu.
