faq:
  - question: Czy potrzebne jest doświadczenie w jeździe konnej?
    answer: >-
      Nie, zupełnie nie! Doświadczeni instruktorzy zadbają o komfort zarówno
      dzieci, jak i dorosłych.
  - question: Jak zarezerwować miejsce?
    answer: >-
      Napisz do organizatorów (503 098 906), wejdź na stronę sasek.pl, wybierz
      pokój i dokonaj rezerwacji online lub e-mailowo. Wpłata zaliczki 30% ceny
      noclegu gwarantuje miejsce. Wszystkie ceny na sasek.pl/cennik.
  - question: Ile kosztuje nocleg?
    answer: 'Noclegi od 100 zł/os/noc. Cennik pokoi na stronie sasek.pl.'
