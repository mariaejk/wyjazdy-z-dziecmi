title: 'Festiwal Rodzinny „Zlot Kaczek" — III edycja'
subtitle: 'Cztery dni warsztatów, muzyki i rodzinnej atmosfery'
date: '2026-08-20'
dateEnd: '2026-08-23'
location: 'Kacze Bagno — Miejsce Inicjatyw Pozytywnych'
category: rodzinny
shortDescription: >-
  Wpiszcie w kalendarz: 20-23 sierpnia 2026! Po raz trzeci spotkamy się pod
  koniec sierpnia, by wspólnie spędzić przedostatni letni weekend. Jeszcze
  więcej warsztatów i wyjątkowych gości, jeszcze więcej magicznych wieczorów i
  niespiesznych poranków.
longDescription: >-
  To wyjątkowe wydarzenie dla małych i nieco większych, dla mamy, taty i dzieci
  w każdym wieku. Nie ma znaczenia, czy na Festiwal wybierzesz się całą
  rodziną, czy samemu z dziećmi, z kolegą, babcią, sąsiadką — na miejscu
  spotkasz ludzi podobnych do Ciebie. Co sprawia, że każdy jest tu
  zaopiekowany — od malucha po seniora.


  Warsztaty muzyczne, plastyczne, ceramiczne, strefy tematyczne oraz kameralne
  koncerty to świetna okazja, aby spędzić naprawdę wyjątkowo czas w
  nadchodzące wakacje. W niespiesznej atmosferze, w bliskości, w naturze — po
  prostu pobyć razem. Animacje dla najmłodszych zapewnią chwile wytchnienia
  dla rodziców, którzy w tym czasie mogą skorzystać z zajęć im dedykowanych
  lub zwyczajnie nie robić nic.


  Na Zlocie Kaczek nie ma oddzielnej strefy warsztatowej dla rodzica i dziecka.
  Wszystkie warsztaty są zaproszeniem do wspólnie spędzonego, wartościowego
  czasu — jednocześnie dbasz o rozwój własny i Twojego dziecka.


  Stawiamy na relacje i rodzinną atmosferę. Nie planujemy stać się dużym,
  komercyjnym wydarzeniem. Chcemy, żeby każdy czuł się u nas jak u siebie.
  Filiżanka kawy pitej w promieniach porannego słońca, pomidorówka wyjadana
  ze wspólnej wazy, bose stopy, wytarte kolana i piasek w kieszeniach —
  piękno i radość zamknięte w prostocie.


  Co planujemy? Pokaz tańca z ogniem, kuglarstwo, łucznictwo, warsztaty
  ceramiczne, rzeźbiarstwo, warsztaty ilustracji, naukę chodzenia na
  szczudłach, grę na bębnach, leśne gry i zabawy, warsztaty malarskie
  i neurografikę, jogę i masaże, tematyczne strefy zabaw dla dzieci,
  warsztaty świadomego rodzicielstwa, choreoterapię, warsztaty teatralne
  oraz emisji głosu, muzykę przy ognisku… i jeszcze więcej.
