title: 'Matka i Córka — Święto Ciała'
subtitle: 'Wyjazdowe warsztaty z ruchem i sztuką dla kobiet i dziewczynek 5+'
date: '2026-06-04'
dateEnd: '2026-06-07'
location: 'Kacze Bagno — Miejsce Inicjatyw Pozytywnych'
category: matka-corka
shortDescription: >-
  Zapraszamy Was na wyjątkowy wyjazd dla mam i córek, którego tematem
  przewodnim będzie ciało — jego mądrość, różnorodność i naturalne piękno.
  To spotkanie stworzone, aby budować czułą i zdrową relację z ciałem już
  od najmłodszych lat oraz wzmacniać więź między matką i córką.
longDescription: >-
  W świecie porównań i ocen wracamy do czucia, oddechu i uważności. Do ruchu,
  który nie musi wyglądać w określony sposób. Do ciała, które nie musi być
  „idealne", aby było wystarczające. Poprzez ruch intuicyjny, taniec, jogę,
  praktyki oddechowe i twórcze działania będziemy odkrywać radość poruszania
  się oraz uczyć się słuchać sygnałów płynących z ciała.


  Podczas wyjazdu Ilona poprowadzi autorską metodę Womanifesto, którą rozwija
  od 20 lat, pracując z kobietami i ich historiami zapisanymi w ciele. To
  łagodna i głęboka praca oparta na powrocie do swojej esencji, odkrywaniu
  ukrytego potencjału oraz wyrażaniu siebie poprzez ruch i sztukę. Ważnym
  elementem będzie wzajemne wsparcie, bycie widzianą i doświadczenie
  kobiecego kręgu.


  Maria poprowadzi dla mam praktykę ukochania swojego ciała — pełną czułości,
  akceptacji i wdzięczności. Będzie to czas zatrzymania, łagodnego spotkania
  ze sobą i spojrzenia na swoje ciało z nowej perspektywy — bez oceniania,
  z uważnością i życzliwością. Poprowadzi również łagodną poranną jogę dla
  mam i córek.


  Tworzymy bezpieczną, wspierającą atmosferę, w której dziewczynki mogą
  poczuć się częścią kobiecego kręgu — widziane i przyjęte dokładnie takie,
  jakie są.


  W programie znajdzie się również ceramika, ceremonia kakao, wspólne
  ognisko, sauna, balia oraz naturalna sesja zdjęciowa dla mam i córek.
  Fotografka Joanna Gieranin, która będzie z nami przez cały wyjazd, jest
  także tancerką i mamą — przyjedzie ze swoją córką i uchwyci Waszą
  bliskość, autentyczność i swobodę w ruchu.
