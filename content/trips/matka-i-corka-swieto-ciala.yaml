collaborator:
  name: Ilona Bekier-Ekwa
  role: 'Choreografka, reżyserka ruchu, nauczycielka jogi i medytacji'
  bio: >-
    Finalistka i choreografka programu „You Can Dance - Po Prostu Tańcz".
    Autorka programów artystyczno-rozwojowych Humanifesto, Womanifesto
    i Manifesto. Od ponad 20 lat prowadzi warsztaty, w których ruch staje
    się narzędziem budowania świadomości ciała. Jest mamą 5-letniej Naomi,
    z którą wspólnie praktykuje jogę i taniec.
  image: /images/ilona.jpg
faq:
  - question: Dla jakiego wieku dziewczynek są warsztaty?
    answer: >-
      Warsztaty są projektowane z myślą o dziewczynkach w wieku 5+. Jeśli Twoja
      córka jest nieco młodsza — skontaktuj się z nami, ocenimy indywidualnie.
  - question: Czy wyżywienie jest wliczone w cenę?
    answer: >-
      Tak, pełne wyżywienie (śniadania, obiady, kolacje) jest wliczone w cenę.
      Posiłki przygotowywane z ekologicznych składników z uwzględnieniem diet.
  - question: Jak zarezerwować miejsce?
    answer: >-
      Gwarancją miejsca jest wpłata zaliczki 450 zł. Dane do przelewu
      otrzymasz po wypełnieniu formularza zgłoszeniowego.
