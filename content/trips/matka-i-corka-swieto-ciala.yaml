practicalInfo:
  accommodation: >-
    Eko-domki (pokoje 3-4 osobowe z łazienką), pokoje w budynku głównym
    (2-3 osobowe z łazienką), duża sala nad pracownią (wieloosobowa
    z dwoma łazienkami), namiot (dostęp do łazienek w budynku głównym).
  food: >-
    3 posiłki dziennie (śniadanie, obiad, kolacja), każdego dnia świeże ciasto,
    owoce, kawa, herbata, woda dostępne non stop. Domowe, zdrowe posiłki
    przygotowywane z ekologicznych produktów od lokalnych dostawców oraz
    z permakulturowego ogrodu. Uwzględniamy diety (alergię, nietolerancję).
  transport: ''
  childCare: >-
    Podczas bloków warsztatowych dla mam, córki mają własny program:
    warsztaty ceramiczne, zajęcia taneczne i twórcze w bezpiecznej przestrzeni.
