title: 'Matka i Córka — Wspólny Rytm'
subtitle: 'Wyjazd z tańcem, jogą i warsztatami dla kobiet i dziewczynek 5+'
date: '2026-03-06'
dateEnd: '2026-03-08'
location: 'Kacze Bagno — Miejsce Inicjatyw Pozytywnych'
category: matka-corka
shortDescription: >-
  Zapraszamy Cię w podróż poza codzienny pośpiech, hałas i role, w które tak
  łatwo wpadamy. „Matka i Córka – Wspólny Rytm" to wyjazdowe warsztaty
  stworzone z myślą o kobietach — tych dużych i tych małych — które pragną
  spotkać się naprawdę: w ruchu, w uważności i w sercu.
longDescription: >-
  Podczas wyjazdu będziemy spotykać się w ruchu i obecności — poprzez jogę,
  taniec intuicyjny, medytacje, sztukę, muzykę i głos.


  Tworzymy przestrzeń, w której córki poczują się częścią kręgu kobiet —
  widziane, ważne i zaproszone do bycia sobą.


  Jednocześnie zadbamy o równowagę. Będzie czas wspólny, pogłębiający relację
  matki i córki, ale także czas oddzielny — moment tylko dla mam, na
  regenerację, refleksję i bycie w kobiecym kręgu. W tym czasie małe kobiety
  spędzą czas razem, budując własne relacje, ucząc się współbycia i wspólnej
  zabawy w bezpiecznej, uważnej przestrzeni.


  Poznasz praktyki, które zabierzesz ze sobą do codzienności — proste, a
  jednocześnie głębokie rytuały ruchu, oddechu i obecności, które mogą stać się
  Waszym wspólnym językiem także po powrocie do domu.


  Spotkasz inne kobiety — mamy i córki — i razem stworzymy krąg wspólnej
  kreacji i autentycznego bycia. Przestrzeń, w której nie trzeba nic
  udowadniać, przyspieszać ani dopasowywać się. Wystarczy być.


  Jeśli czujesz, że chcesz zatrzymać się, odetchnąć i spotkać swoją córkę w
  nowy sposób — ten wyjazd jest dla Was.


  Jeśli pragniesz, by Twoje dziecko od najmłodszych lat doświadczało mocy
  kobiecych spotkań, ruchu i uważności — zapraszamy Was do Wspólnego Rytmu.
