collaborator:
  name: Ilona Bekier-Ekwa
  role: 'Tancerka, choreografka, nauczycielka jogi'
  bio: >-
    Tancerka, choreografka, nauczycielka jogi i medytacji, finalistka oraz
    choreografka programu You Can Dance, mentorka i twórczyni projektu
    rozwojowego dla kobiet Womanifesto. Od ponad 20 lat tworzy przestrzenie, w
    których ruch staje się powrotem do esencji, czułości i autentycznego
    kontaktu ze sobą. Jest też mamą 5-letniej Naomi, z którą wspólnie
    praktykuje jogę i taniec, zapraszając mamy i córki do spotkania we Wspólnym
    Rytmie — poprzez ruch, bliskość i radość bycia razem.
  image: ''
faq:
  - question: Czy mogę przyjechać z dzieckiem młodszym niż 5 lat?
    answer: >-
      Warsztaty są projektowane z myślą o dziewczynkach w wieku 5+. Jeśli Twoje
      dziecko jest nieco młodsze, skontaktuj się z nami — ocenimy
      indywidualnie, czy program będzie odpowiedni.
  - question: Co zabrać ze sobą?
    answer: >-
      Wygodne buty terenowe (najlepiej dwie pary), ubrania „nieszkoda" — takie,
      które mogą się wybrodzić błotem czy gliną. Ciepła warstwa na wieczory,
      krem z filtrem, bidon na wodę i ulubiona przytulanka dziecka. Maty do
      jogi i materiały warsztatowe zapewniamy na miejscu.
  - question: Czy jest zasięg telefoniczny?
    answer: >-
      Kacze Bagno to miejsce, gdzie telefon służy głównie jako aparat
      fotograficzny. Ograniczony zasięg to luksus — dzięki temu macie więcej
      czasu na wspólne ogniska, rozmowy i bycie razem. Traktujcie to jako
      cyfrowy detoks dla całej rodziny.
  - question: Jak dojechać do Kaczego Bagna?
    answer: >-
      Dojazd własny. Szczegółowe wskazówki dojazdu wraz ze współrzędnymi GPS
      otrzymasz po potwierdzeniu rezerwacji. Kacze Bagno znajduje się w
      malowniczej okolicy — idealnej na rodzinny weekend.
  - question: Czy wyżywienie jest wliczone w cenę?
    answer: >-
      Tak, pełne wyżywienie (śniadania, obiady, kolacje) jest wliczone w cenę.
      Posiłki są przygotowywane z ekologicznych składników z uwzględnieniem diet
      i alergii.
  - question: Czy mogę wpłacić zaliczkę przelewem?
    answer: >-
      Tak, zaliczka 450 zł gwarantuje miejsce na wyjeździe. Dane do przelewu
      otrzymasz po wypełnieniu formularza zgłoszeniowego.
